version: '3.8'

services:
  fastapi-app:
    image: duasong111/fastapi-app:latest
    container_name: fastapi-app
    restart: unless-stopped

    # 加入 1Panel 网络
    networks:
      - 1panel-network

    # 端口映射
    ports:
      - "8000:8000"

    # 从 .env 文件读取环境变量
    env_file:
      - .env

    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 使用 1Panel 已有的网络
networks:
  1panel-network:
    external: true